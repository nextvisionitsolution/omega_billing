{% extends 'layouts/base.html' %}

{% block content %}

{% load static %}
<link rel="stylesheet" href="{% static 'billing/css/bootstrap.min.css' %}">
<link rel="stylesheet" href="{% static 'billing/css/bootstrap-icons.min.css' %}">

<style>

body{
    background:#f5f7fb;
    font-family:"Segoe UI",sans-serif;
}

/* HEADER */

.page-header{
    background:#fff;
    padding:16px 20px;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 6px 18px rgba(0,0,0,.06);
}

.page-header h3{
    margin:0;
    font-size:22px;
    font-weight:600;
}

/* CARD */

.form-card{
    max-width:650px;
    margin:auto;
    border:none;
    border-radius:18px;
    background:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* LABEL */

.form-label{
    font-weight:600;
    color:#374151;
}

/* INPUT */

.form-control{
    border-radius:12px;
    padding:12px;
    border:1px solid #d1d5db;
    transition:.3s;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

/* BUTTON */

.btn-save{
    background:#16a34a;
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:600;
    width:100%;
}

.btn-save:hover{
    transform:translateY(-2px);
    transition:.3s;
}

.icon-box{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:50%;
    background:#eff6ff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:15px;
}

.icon-box i{
    font-size:30px;
    color:#2563eb;
}

</style>


<div class="container mt-4">

    <!-- HEADER -->

    <div class="page-header">

        <h3>
            <i class="bi bi-folder-plus"></i>
            Add Category
        </h3>

    </div>


    <!-- FORM CARD -->

    <div class="card form-card p-4">

        <div class="icon-box">

            <i class="bi bi-folder-plus"></i>

        </div>

        <h4 class="text-center mb-4">
            Create New Category
        </h4>

        <form method="POST">

            {% csrf_token %}

            <label class="form-label">
                Category Name
            </label>

            <input
            type="text"
            name="name"
            id="categoryName"
            class="form-control mb-4"
            placeholder="Enter category name..."
            required
            autofocus>

            <button
            type="submit"
            class="btn btn-save">

                <i class="bi bi-check-circle"></i>
                Save Category

            </button>

        </form>

    </div>

</div>

{% endblock %}
