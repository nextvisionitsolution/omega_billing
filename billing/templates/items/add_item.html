{% extends 'layouts/base.html' %}

{% block content %}

{% load static %}
<link rel="stylesheet" href="{% static 'billing/css/bootstrap.min.css' %}">
<link rel="stylesheet" href="{% static 'billing/css/bootstrap-icons.min.css' %}">

<style>

body{
    background:#f5f7fb;
    font-family:"Segoe UI",sans-serif;
}

/* HEADER */

.page-header{
    background:#fff;
    padding:16px 20px;
    border-radius:14px;
    margin-bottom:20px;
    box-shadow:0 6px 18px rgba(0,0,0,.06);
}

.page-header h3{
    margin:0;
    font-size:22px;
    font-weight:600;
}

/* CARD */

.form-card{
    max-width:850px;
    margin:auto;
    border:none;
    border-radius:18px;
    background:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* LABEL */

.form-label{
    font-weight:600;
    color:#374151;
    margin-bottom:8px;
}

/* INPUT */

.form-control{
    border-radius:12px;
    border:1px solid #d1d5db;
    padding:12px;
    transition:.3s;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

/* BUTTON */

.btn{
    border-radius:12px;
    font-weight:600;
}

.btn-save{
    background:#2563eb;
    border:none;
    color:white;
    padding:12px;
}

.btn-save:hover{
    transform:translateY(-2px);
}

/* ICON */

.icon-box{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:50%;
    background:#eff6ff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:15px;
}

.icon-box i{
    color:#2563eb;
    font-size:30px;
}

/* KEYBOARD SHORTCUTS */
.shortcut-hint {
    font-size: 11px;
    background: #f0f4f8;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 8px;
    color: #666;
}

</style>

<script>
document.addEventListener('keydown', function(e) {
    // Alt key combinations
    if (e.altKey) {
        switch(e.key.toLowerCase()) {
            case 'c':
                e.preventDefault();
                document.querySelector('select[name="category"]').focus();
                break;
            case 'n':
                e.preventDefault();
                document.querySelector('input[name="name"]').focus();
                break;
            case '1':
                e.preventDefault();
                document.querySelector('input[name="price1"]').focus();
                break;
            case '2':
                e.preventDefault();
                document.querySelector('input[name="price2"]').focus();
                break;
            case '3':
                e.preventDefault();
                document.querySelector('input[name="price3"]').focus();
                break;
            case 's':
                e.preventDefault();
                document.querySelector('.btn-save').click();
                break;
            case 'i':
                e.preventDefault();
                document.querySelectorAll('.btn-success')[0].click();
                break;
            case 'b':
                e.preventDefault();
                document.querySelector('.btn-secondary').click();
                break;
        }
    }
});
</script>


<div class="container-fluid mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}    

    <!-- HEADER -->

    <div class="page-header d-flex justify-content-between align-items-center">

        <h3>
            <i class="bi bi-plus-square"></i>
            Add Item
        </h3>

        <a href="{% url 'item_list' %}"
        class="btn btn-secondary">

            <i class="bi bi-arrow-left"></i>
            Back
            <span class="shortcut-hint">Alt+B</span>

        </a>

    </div>

    <!-- EXCEL IMPORT CARD -->

    <div class="card form-card p-4 mb-4">

        <div class="icon-box">
            <i class="bi bi-file-earmark-excel"></i>
        </div>

        <h4 class="text-center mb-4">
            Import Items From Excel
        </h4>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <input
                type="hidden"
                name="form_type"
                value="excel_import">

            <div class="mb-3">

                <label class="form-label">
                    Upload Excel File
                </label>

                <input
                    type="file"
                    name="excel_file"
                    class="form-control"
                    accept=".xlsx,.xls"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-success w-100">

                <i class="bi bi-upload"></i>
                Import Excel
                <span class="shortcut-hint">Alt+I</span>

            </button>

        </form>

    </div>


    <!-- FORM CARD -->

    <div class="card form-card p-4">

        <div class="icon-box">

            <i class="bi bi-box-seam"></i>

        </div>

        <h4 class="text-center mb-4">
            Create New Item
        </h4>


        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <!-- Category -->

            <div class="mb-3">

                <label class="form-label">
                    Category
                    <span class="shortcut-hint">Alt+C</span>
                </label>

                <select
                name="category"
                class="form-control"
                required>

                    <option value="">
                        Select Category
                    </option>

                    {% for c in categories %}

                    <option value="{{ c.id }}">
                        {{ c.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>


            <!-- Item Name -->

            <div class="mb-3">

                <label class="form-label">
                    Item Name
                    <span class="shortcut-hint">Alt+N</span>
                </label>

                <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter item name"
                required>

            </div>


            <!-- Prices -->

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Price 1
                        <span class="shortcut-hint">Alt+1</span>
                    </label>

                    <input
                    type="number"
                    step="0.01"
                    name="price1"
                    class="form-control"
                    required>

                </div>


                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Price 2
                        <span class="shortcut-hint">Alt+2</span>
                    </label>

                    <input
                    type="number"
                    step="0.01"
                    name="price2"
                    class="form-control"
                    required>

                </div>


                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Price 3
                        <span class="shortcut-hint">Alt+3</span>
                    </label>

                    <input
                    type="number"
                    step="0.01"
                    name="price3"
                    class="form-control"
                    value="{{ item.price3|default:'0' }}"
                    required>

                </div>

            </div>



            <div class="mt-3">

                <button
                type="submit"
                class="btn btn-save w-100">

                    <i class="bi bi-check-circle"></i>
                    Save Item
                    <span class="shortcut-hint">Alt+S</span>

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
