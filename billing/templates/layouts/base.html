<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Omega POS{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% load static %}
<link rel="stylesheet" href="{% static 'billing/css/bootstrap.min.css' %}">
<link rel="stylesheet" href="{% static 'billing/css/bootstrap-icons.min.css' %}">
<style>

:root {
    /* Core palette */
    --bg:              #f0f3f9;
    --sidebar-bg:      #080e1d;
    --sidebar-border:  rgba(255,255,255,0.055);
    --sidebar-hover:   rgba(255,255,255,0.06);
    --accent:          #4a7cf7;
    --accent-soft:     rgba(74,124,247,0.14);
    --text-primary:    #0d1117;
    --text-muted:      #6b7280;
    --text-dim:        #94a3b8;
    --card-bg:         #ffffff;
    --border:          #e4e9f2;

    /* Dimensions */
    --sidebar-w:           252px;
    --sidebar-collapsed-w: 70px;
    --shortcut-h:          50px;
    --radius:              14px;
    --radius-sm:           9px;

    /* Shadows */
    --shadow-sm:  0 2px 12px rgba(0,0,0,0.06);
    --shadow-md:  0 6px 28px rgba(0,0,0,0.09);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    overflow-x: hidden;
}

body {
    background: var(--bg);
    font-family: 'Outfit', sans-serif;
    color: var(--text-primary);
}

/* ═══════════════════════════
   SIDEBAR
═══════════════════════════ */
.sidebar {
    position: fixed;
    left: 0; top: 0;
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    z-index: 1000;
    transition: width .3s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
    border-right: 1px solid var(--sidebar-border);
}

.sidebar.collapsed { width: var(--sidebar-collapsed-w); }

/* Brand */
.sidebar-brand {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 22px 16px 18px;
    border-bottom: 1px solid var(--sidebar-border);
    flex-shrink: 0;
}

.brand-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(74,124,247,0.5);
    animation: pulse-glow 3s ease-in-out infinite;
}

@keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 16px rgba(74,124,247,0.45); }
    50%       { box-shadow: 0 0 28px rgba(74,124,247,0.75); }
}

.brand-text {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    letter-spacing: .2px;
    white-space: nowrap;
    transition: opacity .22s, transform .22s;
}

.sidebar.collapsed .brand-text {
    opacity: 0;
    transform: translateX(-6px);
    pointer-events: none;
}

/* Nav groups */
.sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px 10px 10px;
    scrollbar-width: none;
}
.sidebar-scroll::-webkit-scrollbar { display: none; }

.nav-group-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.1px;
    text-transform: uppercase;
    color: #3d5068;
    padding: 14px 8px 5px;
    white-space: nowrap;
    transition: opacity .2s;
}
.sidebar.collapsed .nav-group-label { opacity: 0; }

.sidebar a {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 11px;
    color: #7e96b0;
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 500;
    border-radius: 10px;
    margin-bottom: 1px;
    transition: background .18s, color .18s, padding .3s;
    white-space: nowrap;
    position: relative;
}

.sidebar a i {
    font-size: 17px;
    min-width: 22px;
    text-align: center;
    flex-shrink: 0;
    transition: color .18s;
}

.sidebar a span {
    transition: opacity .22s, transform .22s;
}

/* keyboard hint inside sidebar links */
.sidebar a span { display: inline-flex; align-items: center; gap: 8px; }
.sidebar a kbd {
    font-size: 11px; padding: 2px 6px; border-radius: 6px;
    background: rgba(255,255,255,0.06); color: #e2e8f0; font-weight:700;
}
.sidebar.collapsed a kbd { display: none; }

.sidebar.collapsed a {
    justify-content: center;
    padding: 11px 0;
}

.sidebar.collapsed a span {
    opacity: 0;
    transform: translateX(-5px);
    pointer-events: none;
    width: 0;
    overflow: hidden;
}

.sidebar a:hover {
    background: var(--sidebar-hover);
    color: #e2e8f0;
}

.sidebar a.active {
    background: var(--accent-soft);
    color: var(--accent);
}

.sidebar a.active::after {
    content: '';
    position: absolute;
    right: 0; top: 22%; height: 56%;
    width: 3px;
    background: var(--accent);
    border-radius: 4px 0 0 4px;
}

/* Tooltip on collapsed */
.sidebar.collapsed a {
    position: relative;
}

/* Sidebar footer */
.sidebar-footer {
    padding: 12px 10px;
    border-top: 1px solid var(--sidebar-border);
    flex-shrink: 0;
}

.toggle-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 11px;
    background: rgba(255,255,255,0.05);
    border: none;
    border-radius: 9px;
    color: #7e96b0;
    font-size: 13px;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background .18s, color .18s;
    white-space: nowrap;
    overflow: hidden;
}

.toggle-btn:hover { background: rgba(255,255,255,0.09); color: #e2e8f0; }

.toggle-btn i { font-size: 17px; flex-shrink: 0; min-width: 22px; text-align: center; }

.toggle-btn .btn-label {
    transition: opacity .22s, transform .22s;
}
.sidebar.collapsed .toggle-btn .btn-label {
    opacity: 0;
    transform: translateX(-5px);
}

/* ═══════════════════════════
   MAIN CONTENT
═══════════════════════════ */
.content {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
    padding: 26px 28px;
    transition: margin-left .3s cubic-bezier(.4,0,.2,1);
}

.sidebar.collapsed ~ .content { margin-left: var(--sidebar-collapsed-w); }



/* ═══════════════════════════
   CHILD PAGE STYLES
═══════════════════════════ */
.page-header {
    margin-bottom: 22px;
}

.page-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 3px;
}

.page-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -.3px;
}

.pro-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    transition: box-shadow .2s;
}

.pro-card:hover { box-shadow: var(--shadow-md); }

</style>

{% block css %}
{% endblock %}

</head>

<body>

<!-- ══ SIDEBAR ══════════════════════════════ -->
<div class="sidebar" id="sidebar">

    <div class="sidebar-brand">
        <div class="brand-mark">
            <i class="bi bi-lightning-fill"></i>
        </div>
        <span class="brand-text">Omega POS</span>
    </div>

    <div class="sidebar-scroll">

        <div class="nav-group-label">Main</div>

        <a href="{% url 'pos' %}">
            <i class="bi bi-house-door"></i>
            <span>Main Page <kbd>Ctrl+1</kbd></span>
        </a>

        <a href="{% url 'sales_report_page' %}">
            <i class="bi bi-graph-up-arrow"></i>
            <span>Sales Report <kbd>Ctrl+2</kbd></span>
        </a>

        <a href="{% url 'bill_report' %}">
             <i class="bi bi-receipt"></i>
            <span>Bills Report <kbd>Ctrl+3</kbd></span>
        </a>

        <div class="nav-group-label">Inventory</div>

        <a href="{% url 'category_list' %}">
            <i class="bi bi-folder2-open"></i>
            <span>Category List <kbd>Ctrl+4</kbd></span>
        </a>

        <a href="{% url 'add_category' %}">
            <i class="bi bi-plus-circle"></i>
            <span>Add Category <kbd>Ctrl+5</kbd></span>
        </a>

        <a href="{% url 'item_list' %}">
            <i class="bi bi-box-seam"></i>
            <span>Item List <kbd>Ctrl+6</kbd></span>
        </a>

        <a href="{% url 'add_item' %}">
            <i class="bi bi-plus-square"></i>
            <span>Add Item <kbd>Ctrl+7</kbd></span>
        </a>        

    </div>

    <div class="sidebar-footer">
        <button class="toggle-btn" onclick="toggleSidebar()">
            <i class="bi bi-layout-sidebar-inset"></i>
            <span class="btn-label">Collapse</span>
        </button>
    </div>

</div>


<!-- ══ PAGE CONTENT ══════════════════════════ -->
<div class="content">

{% block content %}
{% endblock %}

</div>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("collapsed");

    const lbl = sidebar.querySelector(".btn-label");
    if (lbl) {
        lbl.textContent = sidebar.classList.contains("collapsed") ? "Expand" : "Collapse";
    }
}

/* Mark active nav link */
(function () {
    const links = document.querySelectorAll(".sidebar a");
    const path = window.location.pathname;
    links.forEach(a => {
        if (a.getAttribute("href") && a.getAttribute("href") !== "#" && path.startsWith(a.getAttribute("href"))) {
            a.classList.add("active");
        }
    });
})();

/* Keyboard shortcuts for page navigation */
window.addEventListener("keydown", function (e) {
    if (!e.ctrlKey || e.altKey || e.metaKey) return;
    const activeEl = document.activeElement;
    const tag = activeEl ? activeEl.tagName : "";
    if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;

    const shortcuts = {
        "1": "{% url 'pos' %}",
        "2": "{% url 'sales_report_page' %}",
        "3": "{% url 'bill_report' %}",
        "4": "{% url 'category_list' %}",
        "5": "{% url 'add_category' %}",
        "6": "{% url 'item_list' %}",
        "7": "{% url 'add_item' %}"
    };

    const target = shortcuts[e.key];
    if (target) {
        e.preventDefault();
        window.location.href = target;
    }
});
</script>

{% block js %}
{% endblock %}

</body>
</html>
